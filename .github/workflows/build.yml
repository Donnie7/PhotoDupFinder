name: build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore PhotoDupFinder.sln

      - name: Build
        run: dotnet build PhotoDupFinder.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test PhotoDupFinder.sln --configuration Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Format Check
        run: dotnet format PhotoDupFinder.sln --verify-no-changes --no-restore

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/*.trx
            **/TestResults/**
